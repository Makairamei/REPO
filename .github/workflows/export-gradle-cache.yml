name: Export Gradle Cache

on:
  workflow_dispatch:

jobs:
  export-gradle-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Populate Gradle cache
        run: |
          ./gradlew :NoDrakorID:compileDebugKotlin --no-daemon || true

      - name: Pack Gradle cache
        run: |
          mkdir -p gradle-cache-export
          tar -czf gradle-cache-export/gradle-local-cache.tar.gz \
            -C "$HOME" \
            .gradle/caches/modules-2 \
            .gradle/caches/jars-* \
            .gradle/caches/transforms-* \
            .gradle/wrapper/dists || true

      - name: Upload Gradle cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: gradle-local-cache
          path: gradle-cache-export/gradle-local-cache.tar.gz
          retention-days: 3