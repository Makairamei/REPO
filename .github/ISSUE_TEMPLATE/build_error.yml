name: Build gagal
description: Laporkan module/provider yang gagal build di GitHub Actions.
title: "[Build]: "
labels: ["build", "bug", "needs-triage"]
body:
  - type: input
    id: module
    attributes:
      label: Module/provider
      description: Tulis nama module/provider yang gagal build.
      placeholder: "Contoh: Gerakin21"
    validations:
      required: true

  - type: textarea
    id: error_log
    attributes:
      label: Log error utama
      description: Tempel bagian error yang paling penting dari GitHub Actions, bukan seluruh log panjang.
      render: text
      placeholder: |
        e: file:///... Unresolved reference ...
        > Task :Provider:compileDebugKotlin FAILED
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit/branch
      placeholder: "Contoh: master / commit hash"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Saya sudah menyertakan nama module/provider yang gagal.
        - label: Saya sudah menyertakan log error utama, bukan seluruh log panjang.
        - label: Saya tahu setiap fix provider harus bump version di build.gradle.kts agar ikut ter-build.
